version: 2
updates:
  - package-ecosystem: "uv" # See documentation for possible values
    cooldown:
      default-days: 10 # Fallback cooldown if no specific rule applies
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build(python)"
    groups:
       dev-dependencies:
          patterns:
            - "*"
  - package-ecosystem: "github-actions"
    cooldown:
      default-days: 10 # Fallback cooldown if no specific rule applies
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build(actions)"
    groups:
       action-deps:
          patterns:
            - "*"
